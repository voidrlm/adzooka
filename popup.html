<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adzooka</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0e14;--surface:#13181f;--card:#181e27;--border:#1e2530;--green:#23d160;--text:#dce4f0;--sub:#8a9ab5;--muted:#4a5568}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;width:280px;background:var(--bg);color:var(--text);user-select:none;overflow:hidden}
.hero{position:relative;padding:22px 20px 18px;background:linear-gradient(150deg,#15101a 0%,#0e1520 60%,#0b141e 100%);border-bottom:1px solid var(--border);overflow:hidden}
.hero-glow{position:absolute;width:180px;height:180px;top:-60px;right:-40px;background:radial-gradient(circle,rgba(233,69,96,.18) 0%,transparent 70%);pointer-events:none}
.hero-inner{position:relative;display:flex;align-items:center;gap:14px}
.logo-svg{width:42px;height:42px;filter:drop-shadow(0 4px 12px rgba(233,69,96,.45));flex-shrink:0}
.hero-text{flex:1}
.brand{font-size:17px;font-weight:800;letter-spacing:.4px;background:linear-gradient(90deg,#fff 0%,#c9d8f0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tagline{font-size:11px;color:var(--green);margin-top:3px;font-weight:500;transition:color .3s}
.status-dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);flex-shrink:0;transition:background .3s,box-shadow .3s}
.status-dot.off{background:var(--muted);box-shadow:none}
.pulse-ring{position:absolute;right:0;width:10px;height:10px;border-radius:50%;border:2px solid var(--green);opacity:0;animation:pulse 2.2s ease-out infinite}
.pulse-ring.off{animation:none}
@keyframes pulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(2.8);opacity:0}}
.card{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--card);border-bottom:1px solid var(--border);transition:background .2s}
.card:hover{background:#1c2333}
.card-label{font-size:13px;font-weight:600;color:var(--text)}
.card-host{font-size:11px;color:var(--sub);margin-top:4px;max-width:155px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.switch{position:relative;display:inline-block;flex-shrink:0;cursor:pointer}
.switch input{display:none}
.track{display:block;width:46px;height:26px;background:var(--border);border-radius:26px;border:1.5px solid #2a3344;transition:background .28s,border-color .28s;position:relative}
.thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:var(--muted);box-shadow:0 1px 4px rgba(0,0,0,.4);transition:transform .28s cubic-bezier(.34,1.56,.64,1),background .28s}
.switch input:checked~.track{background:rgba(35,209,96,.15);border-color:rgba(35,209,96,.4)}
.switch input:checked~.track .thumb{transform:translateX(20px);background:var(--green);box-shadow:0 0 8px rgba(35,209,96,.6)}
.picker-btn{display:flex;align-items:center;gap:8px;width:100%;padding:13px 20px;background:none;border:none;border-bottom:1px solid var(--border);color:var(--sub);font-size:13px;font-weight:500;cursor:pointer;transition:background .2s,color .2s;font-family:inherit}
.picker-btn:hover{background:#1c2333;color:var(--text)}
.picker-btn svg{flex-shrink:0;opacity:.7}
.picker-btn.active{color:#e94560}
.picker-btn.active svg{opacity:1}
.backup-row{display:flex;gap:8px;padding:11px 20px;border-bottom:1px solid var(--border);background:var(--surface)}
.backup-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:7px 0;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--sub);font-size:11.5px;font-weight:500;cursor:pointer;transition:background .2s,color .2s;font-family:inherit}
.backup-btn:hover{background:#1c2333;color:var(--text)}
.footer-bar{padding:9px 20px;background:var(--surface);border-top:1px solid var(--border)}
.footer-tag{font-size:10.5px;color:var(--muted);letter-spacing:.3px}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-glow"></div>
  <div class="hero-inner">
    <svg class="logo-svg" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 3L4 10V21C4 29.5 11 37 20 39C29 37 36 29.5 36 21V10L20 3Z" fill="url(#sg)" stroke="url(#sb)" stroke-width="1.2"/>
      <path d="M14 20.5L18.5 25L27 16" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <defs>
        <linearGradient id="sg" x1="20" y1="3" x2="20" y2="39" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#e94560"/><stop offset="100%" stop-color="#9b1d35"/></linearGradient>
        <linearGradient id="sb" x1="20" y1="3" x2="20" y2="39" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#ff6b8a"/><stop offset="100%" stop-color="#e94560"/></linearGradient>
      </defs>
    </svg>
    <div class="hero-text">
      <div class="brand">Adzooka</div>
      <div class="tagline" id="status-text">Active</div>
    </div>
    <div class="pulse-ring" id="pulse-ring"></div>
    <div class="status-dot" id="status-dot"></div>
  </div>
</div>
<div class="card">
  <div class="card-left">
    <div class="card-label">Enable on this site</div>
    <div class="card-host" id="toggle-host">—</div>
  </div>
  <label class="switch">
    <input type="checkbox" id="site-toggle" checked>
    <span class="track"><span class="thumb"></span></span>
  </label>
</div>
<button class="picker-btn" id="editor-btn">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
  </svg>
  Rule Editor
</button>
<button class="picker-btn" id="picker-btn">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>
    <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
  </svg>
  Pick element to block
</button>
<div class="backup-row">
  <button class="backup-btn" id="export-btn">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export rules
  </button>
  <button class="backup-btn" id="import-btn">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 5 17 10"/><line x1="12" y1="5" x2="12" y2="17"/></svg>
    Import rules
  </button>
  <input type="file" id="import-file" accept=".json" style="display:none">
</div>
<div class="footer-bar">
  <span class="footer-tag">🛡 Ads get bazooka'd</span>
</div>
<script src="popup.js"></script>
</body>
</html>
